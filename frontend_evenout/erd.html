<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EvenOut Refined ERD</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f8fafc;
      margin: 0;
      padding: 20px;
    }

    #erd-wrap {
      padding: 1rem 0;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
    }

    #erd svg {
      width: 100%;
      height: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h2 {
      color: #2563eb;
      margin: 0;
    }

    .header p {
      color: #64748b;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h2>EvenOut Streamlined ERD</h2>
    <p>Optimized for NestJS/PostgreSQL (Redundancies & Currency Removed)</p>
  </div>

  <div id="erd-wrap">
    <div id="erd"></div>
  </div>

  <script type="module">
    import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    await document.fonts.ready;
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      fontFamily: '"Segoe UI", system-ui, sans-serif',
      themeVariables: {
        darkMode: dark,
        fontSize: '14px',
        lineColor: dark ? '#9c9a92' : '#64748b',
        textColor: '#000000',
        primaryColor: dark ? '#ffffff' : '#f1f5f9',
        primaryBorderColor: dark ? '#534AB7' : '#3b82f6',
        primaryTextColor: '#000000',
        edgeLabelBackground: dark ? '#1a1a1a' : '#ffffff',
      },
    });

    const diagram = `erDiagram

  users {
    uuid id PK
    text phone_number UK
    text email UK
    text display_name
    text avatar_url
    int split_score
    int timely_settlements
    int overdue_days_total
    text fcm_token
    bool is_active
    timestamp last_seen_at
    timestamp created_at
    timestamp updated_at
  }

  friendships {
    uuid id PK
    uuid requester_id FK
    uuid addressee_id FK
    text status
    timestamp requested_at
    timestamp responded_at
  }

  groups {
    uuid id PK
    text name
    text description
    text avatar_url
    uuid created_by FK
    text invite_code UK
    text invite_qr_url
    bool is_archived
    timestamp created_at
    timestamp updated_at
  }

  group_members {
    uuid id PK
    uuid group_id FK
    uuid user_id FK
    text role
    bool is_active
    timestamp joined_at
    timestamp left_at
  }

expenses {
    uuid id PK "Generated strictly by Flutter client"
    uuid group_id FK "nullable"
    uuid paid_by FK
    uuid created_by FK
    text title
    text description
    text category
    numeric total_amount
    text split_mode
    bool is_deleted "Required for offline soft-deletes"
    int version "Starts at 1, increments on edit"
    timestamp expense_date
    timestamp client_created_at "Time recorded on device"
    timestamp synced_at "Time recorded on server"
  }

  settlements {
    uuid id PK "Generated strictly by Flutter client"
    uuid group_id FK "nullable"
    uuid payer_id FK
    uuid payee_id FK
    numeric amount
    text status
    text payment_method
    text esewa_transaction_id
    text note
    int version
    timestamp client_created_at
    timestamp confirmed_at
    timestamp synced_at
  }

  expense_splits {
    uuid id PK
    uuid expense_id FK
    uuid user_id FK
    numeric amount_owed
    numeric percentage
    bool is_settled
    timestamp settled_at
    timestamp created_at
    timestamp updated_at
  }
  receipts {
    uuid id PK
    uuid expense_id FK
    text storage_path
    text public_url
    jsonb raw_ocr_text
    jsonb parsed_line_items
    text ocr_status
    timestamp created_at
  }

  audit_logs {
    uuid id PK
    uuid actor_id FK
    uuid group_id FK "nullable"
    uuid expense_id FK "nullable"
    uuid settlement_id FK "nullable"
    text entity_type
    text action
    jsonb old_data
    jsonb new_data
    text ip_address
    timestamp created_at
  }

  notifications {
    uuid id PK
    uuid user_id FK
    uuid actor_id FK
    uuid group_id FK "nullable"
    uuid expense_id FK "nullable"
    uuid settlement_id FK "nullable"
    text type
    text title
    text message
    bool is_sent
    bool is_read
    timestamp scheduled_at
    timestamp sent_at
    timestamp created_at
  }

  activity_feed {
    uuid id PK
    uuid group_id FK "nullable"
    uuid actor_id FK
    uuid expense_id FK "nullable"
    uuid settlement_id FK "nullable"
    text action_type
    text description
    jsonb metadata
    timestamp created_at
  }

  users ||--o{ friendships : "sends request"
  users ||--o{ friendships : "receives request"
  users ||--o{ group_members : "joins"
  groups ||--o{ group_members : "has"
  users ||--o{ groups : "creates"
  groups |o--o{ expenses : "contains (optional)"
  users ||--o{ expenses : "pays for"
  expenses ||--o{ expense_splits : "split into"
  users ||--o{ expense_splits : "owes"
  groups |o--o{ settlements : "tracks (optional)"
  users ||--o{ settlements : "pays"
  users ||--o{ settlements : "receives"
  expenses ||--o| receipts : "has"
  users ||--o{ audit_logs : "performs"
  groups |o--o{ audit_logs : "logged for"
  expenses |o--o{ audit_logs : "tracked"
  settlements |o--o{ audit_logs : "tracked"
  users ||--o{ notifications : "receives"
  groups |o--o{ activity_feed : "has feed"
  users ||--o{ activity_feed : "generates"
`;

    const { svg } = await mermaid.render('erd-svg', diagram);
    document.getElementById('erd').innerHTML = svg;

    // Style adjustments for rounded corners
    document.querySelectorAll('#erd svg .node').forEach(node => {
      const firstPath = node.querySelector('path[d]');
      if (!firstPath) return;
      const d = firstPath.getAttribute('d');
      const nums = d.match(/-?[\d.]+/g)?.map(Number);
      if (!nums || nums.length < 8) return;
      const xs = [nums[0], nums[2], nums[4], nums[6]];
      const ys = [nums[1], nums[3], nums[5], nums[7]];
      const x = Math.min(...xs), y = Math.min(...ys);
      const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('rx', '8');
      for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
        if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
      }
      firstPath.replaceWith(rect);
    });

    document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
      p.setAttribute('stroke', 'none');
    });
  </script>
</body>

</html>
